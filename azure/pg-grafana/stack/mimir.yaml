# Minimal single-node (monolithic) Mimir for the demo. Not for production.
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

usage_stats:
  enabled: false

activity_tracker:
  filepath: /data/mimir/activity.log

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir/data

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/ruler

ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1
